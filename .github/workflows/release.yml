name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Cache pkg
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pkg-
            
      - name: Cache TypeScript build
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-ts-${{ hashFiles('**/*.ts', '**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-ts-
            
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Build and package
        run: yarn package
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            bin/git-curate-linux-*
            release/checksums.txt
            release/README.md

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Cache pkg
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pkg-
            
      - name: Cache TypeScript build
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-ts-${{ hashFiles('**/*.ts', '**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-ts-
            
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Build and package
        run: yarn package
        
      - name: Sign macOS binaries
        run: |
          for binary in bin/git-curate-macos-*; do
            codesign --sign - --force --timestamp "$binary"
          done
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            bin/git-curate-macos-*
            release/checksums.txt
            release/README.md

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Cache pkg
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pkg-
            
      - name: Cache TypeScript build
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-ts-${{ hashFiles('**/*.ts', '**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-ts-
            
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Build TypeScript
        run: yarn build
        
      - name: Package Windows binary
        run: |
          # Use pkg directly with specific options for Windows
          npx pkg . --targets node18-win-x64 --output bin/git-curate-win-x64.exe --no-bytecode --public-packages=*
        
      - name: Create release files
        run: yarn create-release-files
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            bin/git-curate-win-*
            release/checksums.txt
            release/README.md

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-binaries/*
            artifacts/macos-binaries/*
            artifacts/windows-binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 